<p>
  <button onclick='saveToGithub()'>儲存到 GitHub</button>
  <button onclick='loadFromGithub()'>從 GitHub 重新載入</button>
</p>
<pre id='log'></pre>
<script>
const $ = (id)=>document.getElementById(id);
['token','repo','branch','path'].forEach(k=>{ const v=localStorage.getItem('srcmgr_'+k); if(v) $(k).value=v; });
function log(s){ $('log').textContent = s; }
function persist(){ ['token','repo','branch','path'].forEach(k=>localStorage.setItem('srcmgr_'+k,$(k).value)); }
function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function ub64(str){ return decodeURIComponent(escape(atob(str))); }
async function ghGet(){
  persist();
  const [owner,name]=$('repo').value.split('/');
  const url=`https://api.github.com/repos/${owner}/${name}/contents/${$('path').value}?ref=${$('branch').value}`;
  const r=await fetch(url,{headers:{'Authorization':'Bearer '+$('token').value,'Accept':'application/vnd.github+json'}});
  if(!r.ok) throw new Error('GET failed '+r.status);
  return await r.json();
}
async function loadFromGithub(){
  try{
    const d=await ghGet();
    $('json').value = ub64((d.content||'').replace(/\n/g,''));
    log('Loaded from GitHub');
  }catch(e){log(String(e));}
}
async function saveToGithub(){
  try{
    persist();
    const text=$('json').value;
    JSON.parse(text);
    const cur=await ghGet();
    const [owner,name]=$('repo').value.split('/');
    const url=`https://api.github.com/repos/${owner}/${name}/contents/${$('path').value}`;
    const body={message:'Update sources via web manager',content:b64(text),sha:cur.sha,branch:$('branch').value};
    const r=await fetch(url,{method:'PUT',headers:{'Authorization':'Bearer '+$('token').value,'Accept':'application/vnd.github+json'},body:JSON.stringify(body)});
    if(!r.ok) throw new Error('PUT failed '+r.status+' '+await r.text());
    log('Saved ✅ 重新跑一次發布流程後，報告就會用新來源。');
  }catch(e){log(String(e));}
}
</script>
